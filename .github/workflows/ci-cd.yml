name: College Lens CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Test Django Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt
      - name: Run Django tests
        env:
          DJANGO_SETTINGS_MODULE: college_review_backend.settings
          DJANGO_SECRET_KEY: 'temporary-secret-key-for-ci'
        run: cd backend && python manage.py test

  test-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
