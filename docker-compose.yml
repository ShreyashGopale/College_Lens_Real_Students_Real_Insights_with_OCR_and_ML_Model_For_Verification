version: '3.8'

services:

  # ─────────────────────────────
  # Django Backend
  # ─────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: college_lens_backend
    environment:
      - DJANGO_SETTINGS_MODULE=college_review_backend.settings
      - SECRET_KEY=django-super-secret-key-change-in-production
      - DEBUG=False
      - ALLOWED_HOSTS=*
      # S3 ML Model ke liye
      - AWS_DEFAULT_REGION=ap-south-1
      - S3_BUCKET_NAME=college-lens-ml-model
      # SQLite use hoga kyunki DB_NAME set nahi hai
    volumes:
      # SQLite database persist rahega
      - sqlite_data:/app/db.sqlite3
      # Uploaded files persist rahenge
      - media_data:/app/media
    ports:
      - "8000:8000"
    restart: always

  # ─────────────────────────────
  # React Frontend
  # ─────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: college_lens_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  sqlite_data:
  media_data:
